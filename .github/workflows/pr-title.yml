name: PR Title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const pattern = /^(feat|fix|chore|docs|refactor|test)(\([^)]+\))?: .+/;
            if (!pattern.test(title)) {
              core.setFailed(`PR title "${title}" must follow conventional format, for example "feat(api): add invite creation endpoint".`);
            }

